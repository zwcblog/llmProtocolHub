site_name: LLM Protocol Hub
site_description: AI 厂商与协议官方入口导航
site_url: https://zwcblog.github.io/llmProtocolHub/
repo_url: https://github.com/zwcblog/llmProtocolHub
repo_name: zwcblog/llmProtocolHub
edit_uri: edit/main/docs/
site_dir: site
use_directory_urls: true

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - 首页: index.md
  - 总索引: INDEX.md
  - 维护规范: MAINTENANCE.md
  - 厂商:
      - 总览: vendors/README.md
      - OpenAI: vendors/openai/README.md
      - Anthropic: vendors/anthropic/README.md
      - Google Gemini: vendors/google-gemini/README.md
      - xAI: vendors/xai/README.md
      - Mistral: vendors/mistral/README.md
      - Cohere: vendors/cohere/README.md
      - DeepSeek: vendors/deepseek/README.md
      - 智谱 AI: vendors/zhipu/README.md
      - MiniMax: vendors/minimax/README.md
      - 阿里云百炼: vendors/alibaba-bailian/README.md
      - 百度千帆: vendors/baidu-qianfan/README.md
      - 腾讯混元: vendors/tencent-hunyuan/README.md
      - 火山引擎: vendors/volcengine/README.md
  - 协议:
      - 总览: protocols/README.md
      - OpenAI Compatible API: protocols/openai-compatible/README.md
      - Model Context Protocol (MCP): protocols/mcp/README.md
      - Agent2Agent (A2A): protocols/a2a/README.md
      - 流式输出格式: protocols/streaming/README.md
      - 工具调用约定: protocols/tool-calling/README.md
      - 多模态消息结构: protocols/multimodal/README.md
