name: Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check (non-blocking)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,301,302,303,403,429
            --exclude-mail
            --exclude 'localhost'
            --exclude-path site
            '**/*.md' '**/*.yml'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
